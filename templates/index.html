<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PolyPulse | High-Confidence Market Scanner</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <div id="loader">
        <div style="text-align: center;">
            <div style="margin-bottom: 1rem;">[ SCANNING PULSE... ]</div>
        </div>
    </div>

    <header>
        <div class="brand">
            <button id="menu-toggle" class="icon-btn" title="Open Filters">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <h1 class="terminal-title">~/polypulse</h1>
        </div>
        <div class="header-actions">
            <button id="refresh-btn" class="icon-btn" title="Refresh Odds & Events">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
                </svg>
            </button>
            <button id="theme-toggle" class="icon-btn theme-toggle" title="Toggle Dark/Light Mode">
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>
    </header>

    <div id="drawer-overlay"></div>
    <aside id="filter-drawer">
        <div class="drawer-header">
            <h2>Scan Settings</h2>
            <button id="close-drawer" class="icon-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <form id="filter-form" class="filters">
            <div class="filter-group">
                <label for="min_prob">Min Prob (%)</label>
                <input type="number" id="min_prob" name="min_prob" value="90" min="50" max="99">
            </div>
            <div class="filter-group">
                <label for="max_prob">Max Prob (%)</label>
                <input type="number" id="max_prob" name="max_prob" value="100" min="50" max="100">
            </div>
            <div class="filter-group">
                <label for="min_volume">Min Volume ($)</label>
                <input type="number" id="min_volume" name="min_volume" value="1000" step="1000">
            </div>

            <div class="filter-group">
                <label>Sort By</label>
                <input type="hidden" id="sort_by" name="sort_by" value="volume">
                <div class="segmented-control" data-input="sort_by">
                    <div class="segment-item active" data-value="volume">Volume</div>
                    <div class="segment-item" data-value="prob">Prob</div>
                    <div class="segment-item" data-value="end_date">Expiry</div>
                </div>
            </div>

            <div class="filter-group">
                <label>Search Depth</label>
                <input type="hidden" id="pages" name="pages" value="10">
                <div class="segmented-control" data-input="pages">
                    <div class="segment-item" data-value="5">Low</div>
                    <div class="segment-item active" data-value="10">Med</div>
                    <div class="segment-item" data-value="20">High</div>
                    <div class="segment-item" data-value="40">Extr</div>
                </div>
            </div>

            <div class="actions">
                <button type="submit" class="btn-primary">Apply & Scan</button>
                <button type="button" id="reset-btn" class="btn-secondary">Reset</button>
            </div>
        </form>

        <div class="drawer-footer">
            <a href="https://x.com/mlsc87" target="_blank" class="social-link">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path
                        d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z">
                    </path>
                </svg>
                <span>Follow @mlsc87</span>
            </a>
        </div>
    </aside>

    <div class="container">
        <div id="results-grid" class="results-grid">
            <!-- JS Injected Cards -->
        </div>
        <div id="pagination-container" class="pagination-container">
            <!-- JS Injected Pagination -->
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>

</html>
